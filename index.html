<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Race Results</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a1a;
            color: #e8e8f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #e94560;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .header .event-info {
            font-size: 14px;
            color: #a8b8d0;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #111128;
            font-size: 13px;
            color: #8890a0;
            border-bottom: 1px solid #252540;
        }

        .status-bar .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        .status-bar .live-dot.offline { background: #666; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .tabs {
            display: flex;
            background: #111128;
            border-bottom: 1px solid #252540;
            overflow-x: auto;
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #6070a0;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab:hover { color: #a0b0d0; }
        .tab.active { color: #ffffff; border-bottom-color: #e94560; }

        .content { padding: 16px; max-width: 900px; margin: 0 auto; }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #e94560;
            margin: 20px 0 10px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid #252540;
        }

        .section-title:first-child { margin-top: 0; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            font-size: 14px;
        }

        thead th {
            text-align: left;
            padding: 8px 10px;
            background: #16213e;
            color: #a0b0d0;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #0f3460;
        }

        tbody td {
            padding: 8px 10px;
            border-bottom: 1px solid #1a1a35;
        }

        tbody tr:hover { background: #16213e; }

        .place-1 { color: #ffd700; font-weight: 700; }
        .place-2 { color: #c0c0c0; font-weight: 600; }
        .place-3 { color: #cd7f32; font-weight: 600; }

        .time { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #5060a0;
            font-size: 18px;
        }

        .no-results .waiting {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .finisher-count {
            display: inline-block;
            background: #16213e;
            color: #a0b0d0;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 8px;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 20px; }
            table { font-size: 13px; }
            .tab { padding: 10px 14px; font-size: 13px; }
            .content { padding: 10px; }
            thead th, tbody td { padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="raceName">Live Race Results</h1>
        <div class="event-info" id="eventInfo">Loading...</div>
    </div>

    <div class="status-bar">
        <div>
            <span class="live-dot" id="liveDot"></span>
            <span id="statusText">Connecting...</span>
        </div>
        <div id="lastUpdate">—</div>
    </div>

    <div class="tabs" id="tabs">
        <div class="tab active" data-view="overall">Overall</div>
        <div class="tab" data-view="category">By Category</div>
    </div>

    <div class="content">
        <div id="results">
            <div class="no-results">
                <div class="waiting">&#9202;</div>
                Waiting for race results...
            </div>
        </div>
    </div>

    <script>
    const REFRESH_INTERVAL = 15000; // 15 seconds
    const RESULTS_URL = 'results.json';

    let currentView = 'overall';
    let lastData = null;
    let lastFetchTime = null;

    // Tab switching
    document.getElementById('tabs').addEventListener('click', (e) => {
        if (!e.target.classList.contains('tab')) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentView = e.target.dataset.view;
        if (lastData) render(lastData);
    });

    function placeClass(place) {
        if (place === 1) return 'place-1';
        if (place === 2) return 'place-2';
        if (place === 3) return 'place-3';
        return '';
    }

    function render(data) {
        const container = document.getElementById('results');

        // Header
        document.getElementById('raceName').textContent = data.race_name || 'Live Race Results';
        document.getElementById('eventInfo').textContent = data.event_info || '';

        if (!data.results || data.results.length === 0) {
            container.innerHTML = `
                <div class="no-results">
                    <div class="waiting">&#9202;</div>
                    Race in progress — waiting for finishers...
                </div>`;
            return;
        }

        let html = '';

        if (currentView === 'overall') {
            // Sort by result_ms
            const sorted = [...data.results].sort((a, b) => a.result_ms - b.result_ms);
            html += `<div class="section-title">Overall Results <span class="finisher-count">${sorted.length} finishers</span></div>`;
            html += `<table><thead><tr>
                <th>#</th><th>Name</th><th>Category</th><th>Time</th>
            </tr></thead><tbody>`;

            sorted.forEach((r, i) => {
                const pc = placeClass(i + 1);
                html += `<tr>
                    <td class="${pc}">${i + 1}</td>
                    <td class="${pc}">${r.first_name} ${r.last_name}</td>
                    <td>${r.category}</td>
                    <td class="time">${r.result_time}</td>
                </tr>`;
            });
            html += '</tbody></table>';

        } else {
            // Group by category
            const groups = {};
            data.results.forEach(r => {
                if (!groups[r.category]) groups[r.category] = [];
                groups[r.category].push(r);
            });

            const catNames = Object.keys(groups).sort();
            catNames.forEach(cat => {
                const riders = groups[cat].sort((a, b) => a.result_ms - b.result_ms);
                html += `<div class="section-title">${cat} <span class="finisher-count">${riders.length}</span></div>`;
                html += `<table><thead><tr>
                    <th>#</th><th>Name</th><th>Time</th>
                </tr></thead><tbody>`;

                riders.forEach((r, i) => {
                    const pc = placeClass(i + 1);
                    html += `<tr>
                        <td class="${pc}">${i + 1}</td>
                        <td class="${pc}">${r.first_name} ${r.last_name}</td>
                        <td class="time">${r.result_time}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
            });
        }

        container.innerHTML = html;
    }

    async function fetchResults() {
        try {
            const resp = await fetch(RESULTS_URL + '?t=' + Date.now());
            if (!resp.ok) throw new Error('No results yet');

            const data = await resp.json();
            lastData = data;
            lastFetchTime = new Date();
            render(data);

            document.getElementById('liveDot').classList.remove('offline');
            document.getElementById('statusText').textContent =
                `Live — ${data.results ? data.results.length : 0} finishers`;

        } catch (e) {
            document.getElementById('liveDot').classList.add('offline');
            document.getElementById('statusText').textContent = 'Waiting for results...';
        }

        // Update "last checked" time
        if (lastFetchTime) {
            const ago = Math.round((Date.now() - lastFetchTime.getTime()) / 1000);
            document.getElementById('lastUpdate').textContent =
                ago < 5 ? 'Just now' : `Checked ${ago}s ago`;
        }
    }

    // Initial fetch + periodic refresh
    fetchResults();
    setInterval(fetchResults, REFRESH_INTERVAL);

    // Update the "ago" counter every second
    setInterval(() => {
        if (lastFetchTime) {
            const ago = Math.round((Date.now() - lastFetchTime.getTime()) / 1000);
            document.getElementById('lastUpdate').textContent =
                ago < 5 ? 'Just now' : `Checked ${ago}s ago`;
        }
    }, 1000);
    </script>
</body>
</html>
